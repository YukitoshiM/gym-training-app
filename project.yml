name: GymTrainingApp
options:
  bundleIdPrefix: com.yukitoshim
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
targets:
  GymTrainingApp:
    type: application
    platform: iOS
    sources:
      - path: GymTrainingApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yukitoshim.gymtrainingapp
        INFOPLIST_KEY_CFBundleDisplayName: Gym Training
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: GymTrainingApp/Info.plist
      properties:
        CFBundleDisplayName: Gym Training
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  GymTrainingWatchApp:
    type: application
    platform: watchOS
    sources:
      - path: GymTrainingWatchApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yukitoshim.gymtrainingapp.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        INFOPLIST_KEY_CFBundleDisplayName: Gym Watch
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.yukitoshim.gymtrainingapp
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        TARGETED_DEVICE_FAMILY: 4
    info:
      path: GymTrainingWatchApp/Info.plist
      properties:
        CFBundleDisplayName: Gym Watch
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.yukitoshim.gymtrainingapp
  GymTrainingAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GymTrainingAppUITests
    dependencies:
      - target: GymTrainingApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yukitoshim.gymtrainingapp.uitests
        TEST_TARGET_NAME: GymTrainingApp
        GENERATE_INFOPLIST_FILE: YES
